<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Name – Assistant Chatbot</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-8NSBbbBep2D45PptS3AUHN9FeNF1doLU0YYiZoY9DhFv+1E8fDyTLC0eqV9U+PXISGEc8lciHhDNXdwIth8rUA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Site Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="hero-content">
            <h1>👋 Hi, I'm personal assistant of Kritesh</h1>
            <p>Feel free to ask me anything about my experience!</p>
        </div>
    </header>

    <main>
        <!-- Chat Section -->
        <section id="chat" class="chat-section">
            <h2>Assistant Chat</h2>
            <p class="chat-description">Use the chat below to ask me about my experience, projects, or just say hello.</p>
            <div id="chat-container">
                <div id="messages" aria-live="polite"></div>
                <div class="input-area">
                    <input id="user-input" type="text" placeholder="Type your message…" autocomplete="off" />
                    <button id="send-btn" aria-label="Send message"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        </section>
    </main>

    <!-- Site Script -->
    <script src="script.js"></script>
</body>
</html>
